<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Kurukh Dictionary — Redesign</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { background: #f0eee9; font-family: -apple-system, system-ui, sans-serif; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Starters -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="web-screens.jsx"></script>
  <script type="text/babel" src="mobile-screens.jsx"></script>
  <script type="text/babel" src="hindi-screens.jsx"></script>
  <script type="text/babel" src="new-pages.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard,
      ChromeWindow, IOSDevice, AndroidDevice,
      WebHome, WebWordDetail, IOSHome, IOSWordDetail, IOSContribute,
      AndroidHome, AndroidWordDetail,
      HiWebHome, HiWebWordDetail, HiIOSHome, HiIOSWordDetail,
      HiAndroidHome, HiAndroidWordDetail,
      WebContribute, WebEditor, WebReview, WebProfile, KD } = window;

    // Custom browser chrome that matches the dictionary brand more sympathetically
    // than the default dark Chrome. Light/dark variants.
    function KurukhBrowser({ dark = false, url = 'kurukh.dict/word/khekhel', width, height, children }) {
      const bar = dark ? '#26221E' : '#EFE7D5';
      const text = dark ? '#F2EBDC' : '#1C1814';
      const dim = dark ? '#B8AE9A' : '#8A8073';
      return (
        <div style={{
          width, height, borderRadius: 12, overflow: 'hidden',
          boxShadow: '0 30px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(28,24,20,0.10)',
          display: 'flex', flexDirection: 'column',
          background: bar,
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', gap: 14, padding: '12px 16px',
            background: bar, borderBottom: `1px solid ${dark ? 'rgba(242,235,220,0.08)' : 'rgba(28,24,20,0.08)'}`,
          }}>
            <div style={{ display: 'flex', gap: 7 }}>
              <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#ff5f57' }}/>
              <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#febc2e' }}/>
              <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#28c840' }}/>
            </div>
            <div style={{ display: 'flex', gap: 6, color: dim }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
            </div>
            <div style={{
              flex: 1, height: 30, borderRadius: 8, background: dark ? '#1B1816' : '#FBF7EE',
              display: 'flex', alignItems: 'center', padding: '0 12px', gap: 10,
              fontFamily: '"DM Sans", system-ui', fontSize: 12, color: text,
            }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill={dim}><path d="M12 1a4 4 0 0 0-4 4v3H6v13h12V8h-2V5a4 4 0 0 0-4-4zm-2 7V5a2 2 0 1 1 4 0v3z"/></svg>
              {url}
              <span style={{ flex: 1 }}/>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={dim} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
            </div>
          </div>
          <div style={{ flex: 1, overflow: 'auto', background: dark ? KD.dark.bg : KD.light.bg }}>
            {children}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          {/* SECTION 1 — Web, light */}
          <DCSection id="web-light"
            title="Web · Light"
            subtitle="Desktop dictionary, warm bone palette, terracotta accent.">
            <DCArtboard id="wl-home" label="Home" width={1280} height={1500}>
              <KurukhBrowser url="kurukh.dict" width={1280} height={1500}>
                <WebHome dark={false}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="wl-detail" label="Word detail · khekhel" width={1280} height={1500}>
              <KurukhBrowser url="kurukh.dict/word/khekhel" width={1280} height={1500}>
                <WebWordDetail dark={false}/>
              </KurukhBrowser>
            </DCArtboard>
          </DCSection>

          {/* SECTION 2 — Web, dark */}
          <DCSection id="web-dark"
            title="Web · Dark"
            subtitle="Warm charcoal — never pure black. Same accent, same temperature.">
            <DCArtboard id="wd-home" label="Home" width={1280} height={1500}>
              <KurukhBrowser dark url="kurukh.dict" width={1280} height={1500}>
                <WebHome dark={true}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="wd-detail" label="Word detail · khekhel" width={1280} height={1500}>
              <KurukhBrowser dark url="kurukh.dict/word/khekhel" width={1280} height={1500}>
                <WebWordDetail dark={true}/>
              </KurukhBrowser>
            </DCArtboard>
          </DCSection>

          {/* SECTION 3 — iOS (React Native) */}
          <DCSection id="ios"
            title="iOS · React Native"
            subtitle="Generous typography for readers of every age — tap targets ≥ 44pt.">
            <DCArtboard id="ios-home-light" label="Home · light" width={402} height={874}>
              <IOSDevice dark={false} width={402} height={874}>
                <IOSHome dark={false}/>
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="ios-detail-light" label="Word detail · light" width={402} height={874}>
              <IOSDevice dark={false} width={402} height={874}>
                <IOSWordDetail dark={false}/>
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="ios-contribute" label="Contribute · light" width={402} height={874}>
              <IOSDevice dark={false} width={402} height={874}>
                <IOSContribute dark={false}/>
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="ios-home-dark" label="Home · dark" width={402} height={874}>
              <IOSDevice dark={true} width={402} height={874}>
                <IOSHome dark={true}/>
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="ios-detail-dark" label="Word detail · dark" width={402} height={874}>
              <IOSDevice dark={true} width={402} height={874}>
                <IOSWordDetail dark={true}/>
              </IOSDevice>
            </DCArtboard>
          </DCSection>

          {/* SECTION 5 — Hindi · Web */}
          <DCSection id="hi-web"
            title="हिन्दी · Web"
            subtitle="Devanagari typography (Noto Serif Devanagari) — same palette and rhythm as Kurukh.">
            <DCArtboard id="hi-web-home-light" label="मुख्य · light" width={1280} height={1500}>
              <KurukhBrowser url="kosh.dict" width={1280} height={1500}>
                <HiWebHome dark={false}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="hi-web-detail-light" label="शब्द · जंगल · light" width={1280} height={1500}>
              <KurukhBrowser url="kosh.dict/शब्द/जंगल" width={1280} height={1500}>
                <HiWebWordDetail dark={false}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="hi-web-home-dark" label="मुख्य · dark" width={1280} height={1500}>
              <KurukhBrowser dark url="kosh.dict" width={1280} height={1500}>
                <HiWebHome dark={true}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="hi-web-detail-dark" label="शब्द · जंगल · dark" width={1280} height={1500}>
              <KurukhBrowser dark url="kosh.dict/शब्द/जंगल" width={1280} height={1500}>
                <HiWebWordDetail dark={true}/>
              </KurukhBrowser>
            </DCArtboard>
          </DCSection>

          {/* SECTION 6 — Hindi · iOS */}
          <DCSection id="hi-ios"
            title="हिन्दी · iOS"
            subtitle="Devanagari display lockup; Hindi numerals; same Kurukh palette.">
            <DCArtboard id="hi-ios-home-light" label="मुख्य · light" width={402} height={874}>
              <IOSDevice dark={false} width={402} height={874}>
                <HiIOSHome dark={false}/>
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="hi-ios-detail-light" label="शब्द · जंगल · light" width={402} height={874}>
              <IOSDevice dark={false} width={402} height={874}>
                <HiIOSWordDetail dark={false}/>
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="hi-ios-home-dark" label="मुख्य · dark" width={402} height={874}>
              <IOSDevice dark={true} width={402} height={874}>
                <HiIOSHome dark={true}/>
              </IOSDevice>
            </DCArtboard>
            <DCArtboard id="hi-ios-detail-dark" label="शब्द · जंगल · dark" width={402} height={874}>
              <IOSDevice dark={true} width={402} height={874}>
                <HiIOSWordDetail dark={true}/>
              </IOSDevice>
            </DCArtboard>
          </DCSection>

          {/* SECTION 7 — Hindi · Android */}
          <DCSection id="hi-android"
            title="हिन्दी · Android"
            subtitle="Material 3 expressive — full Devanagari surface; Hindi numerals on stat cards.">
            <DCArtboard id="hi-and-home-light" label="मुख्य · light" width={412} height={892}>
              <AndroidDevice dark={false} width={412} height={892}>
                <HiAndroidHome dark={false}/>
              </AndroidDevice>
            </DCArtboard>
            <DCArtboard id="hi-and-detail-light" label="शब्द · चाँद · light" width={412} height={892}>
              <AndroidDevice dark={false} width={412} height={892}>
                <HiAndroidWordDetail dark={false}/>
              </AndroidDevice>
            </DCArtboard>
            <DCArtboard id="hi-and-home-dark" label="मुख्य · dark" width={412} height={892}>
              <AndroidDevice dark={true} width={412} height={892}>
                <HiAndroidHome dark={true}/>
              </AndroidDevice>
            </DCArtboard>
            <DCArtboard id="hi-and-detail-dark" label="शब्द · चाँद · dark" width={412} height={892}>
              <AndroidDevice dark={true} width={412} height={892}>
                <HiAndroidWordDetail dark={true}/>
              </AndroidDevice>
            </DCArtboard>
          </DCSection>

          {/* SECTION 4 — Android (React Native) */}
          <DCSection id="android"
            title="Android · React Native"
            subtitle="Material 3 expressive — rounded shapes, dynamic color, large display type.">
            <DCArtboard id="and-home-light" label="Home · light" width={412} height={892}>
              <AndroidDevice dark={false} width={412} height={892}>
                <AndroidHome dark={false}/>
              </AndroidDevice>
            </DCArtboard>
            <DCArtboard id="and-detail-light" label="Word detail · light" width={412} height={892}>
              <AndroidDevice dark={false} width={412} height={892}>
                <AndroidWordDetail dark={false}/>
              </AndroidDevice>
            </DCArtboard>
            <DCArtboard id="and-home-dark" label="Home · dark" width={412} height={892}>
              <AndroidDevice dark={true} width={412} height={892}>
                <AndroidHome dark={true}/>
              </AndroidDevice>
            </DCArtboard>
            <DCArtboard id="and-detail-dark" label="Word detail · dark" width={412} height={892}>
              <AndroidDevice dark={true} width={412} height={892}>
                <AndroidWordDetail dark={true}/>
              </AndroidDevice>
            </DCArtboard>
          </DCSection>
          {/* SECTION 8 — New site pages from the repo */}
          <DCSection id="new-pages"
            title="Site pages · Contribute / Editor / Review / Profile"
            subtitle="Redesigns of /contribute, /kurukh-editor, /review, /profile from kurukh-lab.github.io.">
            <DCArtboard id="np-contribute-light" label="Contribute · light" width={1280} height={1800}>
              <KurukhBrowser url="kurukh.dict/contribute" width={1280} height={1800}>
                <WebContribute dark={false}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="np-editor-light" label="Kurukh Editor · light" width={1280} height={1500}>
              <KurukhBrowser url="kurukh.dict/editor" width={1280} height={1500}>
                <WebEditor dark={false}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="np-review-light" label="Community Review · light" width={1280} height={1700}>
              <KurukhBrowser url="kurukh.dict/review" width={1280} height={1700}>
                <WebReview dark={false}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="np-profile-light" label="Profile · light" width={1280} height={1600}>
              <KurukhBrowser url="kurukh.dict/profile" width={1280} height={1600}>
                <WebProfile dark={false}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="np-contribute-dark" label="Contribute · dark" width={1280} height={1800}>
              <KurukhBrowser dark url="kurukh.dict/contribute" width={1280} height={1800}>
                <WebContribute dark={true}/>
              </KurukhBrowser>
            </DCArtboard>
            <DCArtboard id="np-editor-dark" label="Kurukh Editor · dark" width={1280} height={1500}>
              <KurukhBrowser dark url="kurukh.dict/editor" width={1280} height={1500}>
                <WebEditor dark={true}/>
              </KurukhBrowser>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
